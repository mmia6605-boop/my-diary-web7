<!DOCTYPE html>
<html>
<head>
  <title>My Diary Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{ background:#f5f5f5; color:#222; font-family:Arial; padding:10px; transition: background 0.3s,color 0.3s;}
    body.dark{ background:#121212; color:white;}
    input,button,select,textarea{ padding:6px; margin:4px; border:1px solid #aaa; border-radius:4px; background:#fff;color:#222; transition: background 0.3s,color 0.3s; font-size:14px;}

    #chartContainer{ margin-top:20px; }

    /* Box & Swipe */

    body.dark .box{ background:#1e1e1e; border-color:#555; color:white;}
    .box-content{ flex:1; padding-right:90px; white-space: pre-wrap; word-break: break-word; }
    .box-buttons{ position:absolute; right:-90px; top:0; height:100%; display:flex; align-items:center; background:transparent; transition: right 0.3s; }
    .box-buttons button{ margin:0 2px; font-size:12px; padding:2px 6px; }

    /* Theme Selector small */
    #themeSelect{

      left: 8px;
      font-size: 11px;

      border-radius: 4px;
      border: 1px solid #888;
      background: #fff;
      color: #222;
      z-index: 1000;
    }
    body.dark #themeSelect{
      background:#1e1e1e;
      color:white;
      border:1px solid #555;
    }

    /* Inputs compact */
    #date,#time,#note,#amount,#sort,#search,#addBtn,#clearBtn{ width:100%; box-sizing:border-box; }
    #note{ min-height:50px; }
    .action-buttons{ display:flex; gap:5px; }
  #liveAmount {
  color: green;        /* font color in light mode */
}
body.dark #liveAmount {
  color: lightgreen;    /* font color in dark mode */
}
#sortBtn {
  width: 35px;
  height: 35px;
  font-size: 16px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#searchSortBar {
  position: relative; /* changed from sticky */
  top: auto;          /* remove top positioning */
  background: inherit;
  z-index: auto;      /* optional */
  transition: none;   /* remove scroll transform animation */
  display: flex;
  gap:5px;
  align-items: center;
  margin-bottom:5px;  /* spacing from previous element */
}
#sortBtn {
  width: 35px;
  height: 35px;
  font-size: 18px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s ease;
}

#sortBtn.rotate {
  transform: rotate(180deg);
}

##searchSortBar {
  position: relative;  /* normal flow */
  top: auto;           /* remove sticky top */
  background: inherit;
  z-index: auto;
  transition: none;    /* no transform animation needed */
  display: flex;
  gap:5px;
  align-items: center;
  margin-bottom:5px;
}
/* Login Container Layout */
.login-container {
  display: flex;
  flex-direction: row;
  align-items: flex-end; /* Aligns button with the bottom of the inputs */

  max-width: 500px;

  display: flex;
  flex-direction: column;
  flex: 1;

/* Increased Button Height */
#login-btn {
  height: 74px; /* Matches the height of two inputs + gaps */

  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="login">
  <h2>Login</h2>
  <div class="login-container">
    <div class="login-inputs">
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
    </div>
    <button id="login-btn" onclick="login()">Login</button>
  </div>
</div>


<div id="app" style="display:none;">
  <button onclick="logout()" style="position:absolute; top:10px; right:10px; padding:5px 10px;">Logout</button>
  <h1>My Diary</h1>

  <div style="display:flex; gap:5px; margin-bottom:5px;">
  <input type="date" id="date" style="flex:1;">
  <input type="time" id="time" style="flex:1;">
</div>
  <textarea id="note" placeholder="Note (Enter for new line)"></textarea>
<div style="display:flex; gap:5px; align-items:center;">
  <input type="text" id="liveAmount" placeholder="Live Amount" readonly>
  <input type="text" id="amount" placeholder="Amount auto-calculated from Note">
</div>
<p id="error"></p>
  <input type="file" id="imageInput" accept="image/*">
  <!-- Clear + Add buttons -->
  <div class="action-buttons">
    <button id="clearBtn" onclick="clearAllFields()">Clear</button>
    <button id="addBtn" onclick="addEntry()">Add</button>
  </div>

  <div id="searchSortBar" style="display:flex; gap:5px; align-items:center;">
  <input type="text" id="search" placeholder="Search..." onkeyup="searchData()" style="flex:1;">
  
  <button id="sortBtn" onclick="toggleSort()">🔽</button>
</div>

  <h3>Total This Month: ₹<span id="total">0</span></h3>

  <div class="pinned-toggle" onclick="togglePinned()">📌 Pinned Messages</div>
  <div id="pinned" class="pinned-section"></div>

  <div id="list"></div>

  <div id="chartContainer">
    <canvas id="monthlyChart" height="150"></canvas>
  </div>
</div>

<select id="themeSelect">
  <option value="auto">Auto</option>
  <option value="light">Light</option>
  <option value="dark">Dark</option>
</select>

<script>
const firebaseConfig={ 
  apiKey:"AIzaSyDyHchZ-cMunCm428PivwvV6nKEAYpmDPs",
  authDomain:"my-diary-14567.firebaseapp.com",
  projectId:"my-diary-14567",
  storageBucket:"my-diary-14567.firebasestorage.app",
  messagingSenderId:"929514949228",
  appId:"1:929514949228:web:e697ffab1e11cc0ec66649"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let data=[],editId=null,monthlyChart=null;

let sortType = "new";

function toggleSort() {
  sortType = (sortType === "new") ? "old" : "new";
  loadData();
}
function toggleSort() {
  sortType = (sortType === "new") ? "old" : "new";
  
  const btn = document.getElementById("sortBtn");
  
  if (sortType === "old") {
    btn.classList.add("rotate"); // 🔼
  } else {
    btn.classList.remove("rotate"); // 🔽
  }
  
  loadData();
}
// Theme load
window.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("sortBtn").classList.remove("rotate");
  const savedTheme = localStorage.getItem("theme") || "auto";
  const themeSelect = document.getElementById("themeSelect");
  themeSelect.value = savedTheme;
  applyTheme(savedTheme);
  themeSelect.addEventListener("change", ()=>{
    const selected = themeSelect.value;
    localStorage.setItem("theme", selected);
    applyTheme(selected);
  });
});

function applyTheme(theme){
  if(theme === "light"){ document.body.classList.remove("dark"); } 
  else if(theme === "dark"){ document.body.classList.add("dark"); } 
  else if(theme === "auto"){
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    if(prefersDark) document.body.classList.add("dark");
    else document.body.classList.remove("dark");
  }
}

// Login
function login(){
  let email=document.getElementById("email").value;
  let password=document.getElementById("password").value;
  if(!email||!password){ alert("Enter email & password"); return; }
  firebase.auth().signInWithEmailAndPassword(email,password)
    .then(()=>{ document.getElementById("login").style.display="none"; document.getElementById("app").style.display="block"; loadData(); })
    .catch(err=>{ alert("Login Error: "+err.message); });
}

// Parse amount from note
function parseAmount(note, manualAmount) {
  if (manualAmount) return parseInt(manualAmount) || 0;
  
  if (!note) return 0;
  
  // ✅ Replace comma with +
  let expr = note.replace(/,/g, "+");
  
  // ✅ Add + between numbers if no operator (space case)
  expr = expr.replace(/(\d)\s+(\d)/g, "$1+$2");
  
  // ✅ Keep only valid characters (security)
  expr = expr.replace(/[^0-9+\-]/g, "");
  
  try {
    // ✅ Evaluate expression
    return eval(expr) || 0;
  } catch {
    return 0;
  }
}

// Live amount calculation while typing
const noteBox = document.getElementById("note");

noteBox.addEventListener("input", () => {
  const note = noteBox.value;
  
  // ✅ Live amount
  const liveAmt = parseAmount(note, null);
  document.getElementById("liveAmount").value = liveAmt;
  
  // ✅ Auto height
  noteBox.style.height = "auto"; // reset
  noteBox.style.height = noteBox.scrollHeight + "px"; // grow
});
let imageBase64 = null;

// Convert selected image to Base64
document.getElementById("imageInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    imageBase64 = evt.target.result; // store Base64 string
  };
  reader.readAsDataURL(file);
});
// Add/Update Entry
async function addEntry(){
  let date=document.getElementById("date").value || new Date().toISOString().split('T')[0];
  let time=document.getElementById("time").value || new Date().toTimeString().slice(0,5);
  let note=document.getElementById("note").value.trim();
  if(!note){ 
    document.getElementById("error").innerText="Note required"; 
    document.getElementById("error").style.display="block"; 
    return; 
  }
  let manualAmount=document.getElementById("amount").value.trim();
  let amount = parseAmount(note, manualAmount);

  const [year,month,day] = date.split("-");
  const formattedDate = day+"/"+month+"/"+year+" "+time;

  const entryData = { date: formattedDate, note, amount, pinned:false, created:Date.now(), image:imageBase64 };

  if(editId){
    await db.collection("entries").doc(editId).update(entryData);
    editId=null; 
    document.getElementById("addBtn").innerText="Add";
  } else {
    await db.collection("entries").add(entryData);
  }

  document.getElementById("error").style.display="none";
  clearAllFields(); 
  imageBase64 = null; // reset image
  document.getElementById("imageInput").value = ""; // clear file input
  loadData();
}

// Clear all fields
function clearAllFields() {  
  document.getElementById("date").value = "";  
  document.getElementById("time").value = "";  
  document.getElementById("note").value = "";  
  document.getElementById("note").style.height = "50px"; // ✅ reset height
  document.getElementById("amount").value = "";  
  document.getElementById("liveAmount").value = "";
  document.getElementById("imageInput").value = "";
  editId = null;  
  document.getElementById("addBtn").innerText = "Add";  
  document.getElementById("search").value = "";
loadData(); // ✅ reload full data
}

// Load Data and sort
async function loadData(){
  let snapshot = await db.collection("entries").get();
  data = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));

  // use global sortType (no dropdown)
  data.sort((a,b)=>{
    const parseDate = str=>{
      const [d,m,y,t] = str.split(/[/ ]/);
      const [h,min] = t.split(":").map(Number);
      return new Date(y,m-1,d,h,min);
    };
    const dateA = parseDate(a.date);
    const dateB = parseDate(b.date);
    return sortType==="new"? dateB-dateA : dateA-dateB;
  });

  display(data);
  renderChart(data);
}

// Display with swipe
function display(arr){
  const list=document.getElementById("list");
  const pinnedDiv=document.getElementById("pinned");
  list.innerHTML=""; pinnedDiv.innerHTML="";
  let total = 0;
const now = new Date();
const isSearching = arr.length !== data.length;

const grouped = {};

arr.forEach(item => {
  const [day, month, year] = item.date.split(" ")[0].split("/");
  const dt = new Date(year, month - 1, day);
  const monthKey = dt.getFullYear() + "-" + (dt.getMonth() + 1);
  
  if (!grouped[monthKey]) grouped[monthKey] = [];
  grouped[monthKey].push(item);
  
  // ✅ If searching → count ALL filtered results
  if (isSearching) {
    total += item.amount;
  }
  // ✅ If NOT searching → only current month
  else {
    if (dt.getMonth() === now.getMonth() && dt.getFullYear() === now.getFullYear()) {
      total += item.amount;
    }
  }
});

const totalText = document.getElementById("total");
const totalLabel = document.querySelector("h3");

totalText.innerText = total;

// ✅ Change heading based on search
if (isSearching) {
  totalLabel.innerHTML = `Filtered Total: ₹<span id="total">${total}</span>`;
} else {
  totalLabel.innerHTML = `Total This Month: ₹<span id="total">${total}</span>`;
}

  Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).forEach(monthKey=>{
    const monthItems=grouped[monthKey];
    const [year,month]=monthKey.split("-");
    const monthName=new Date(year,month-1).toLocaleString('default',{month:'long',year:'numeric'});
    const monthTotal=monthItems.reduce((s,i)=>s+i.amount,0);

    const monthDiv=document.createElement("div");
    monthDiv.className="month-section";
    monthDiv.innerHTML=`<div class="month-title">${monthName} - Total ₹${monthTotal}</div>`;

    monthItems.forEach(item=>{
      const box=document.createElement("div");
      box.className="box";
      box.id="item-"+item.id;
      // Inside your display(arr) function, update the innerHTML:
box.innerHTML = `<div class="box-content" style="line-height:1.2;"><div><strong>${item.date}</strong></div><div>${item.note.trim()} - ₹${item.amount}</div>${item.image ? `<br><img src="${item.image}" style="max-width:100px; max-height:80px; margin-top:5px; border-radius:4px; cursor:pointer;" onclick="openImage('${item.image}')">` : ''}</div><div class="box-buttons"><button onclick="editItem('${item.id}')">Edit</button><button onclick="togglePin('${item.id}')">${item.pinned?'Unpin':'Pin'}</button><button onclick="deleteItem('${item.id}')">Delete</button></div>`;


      // Swipe functionality
      let startX=0;
      box.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; });
      box.addEventListener('touchmove', e=>{
        let diff = e.touches[0].clientX - startX;
        if(diff<0){ box.querySelector('.box-buttons').style.right=Math.min(-diff,90)+'px'; }
      });
      box.addEventListener('touchend', e=>{
        let rightVal = parseInt(box.querySelector('.box-buttons').style.right);
        if(rightVal>45){ box.querySelector('.box-buttons').style.right='0px'; } 
        else { box.querySelector('.box-buttons').style.right='-90px'; }
      });

      monthDiv.appendChild(box);
      if(item.pinned){ pinnedDiv.appendChild(box.cloneNode(true)); }
    });
    list.appendChild(monthDiv);
  });
}

// Pin/Unpin/Search/Edit/Delete/Clear
function togglePinned(){ const sec=document.getElementById("pinned"); sec.style.display=sec.style.display==="block"?"none":"block"; }
function searchData() {
  let text = document.getElementById("search").value.toLowerCase().trim();
  
  // ✅ If empty → show all data (current month total handled in display)
  if (!text) {
    display(data);
    return;
  }
  
  const filtered = data.filter(d => {
    const noteMatch = d.note.toLowerCase().includes(text);
    
    const [day, month, year] = d.date.split(" ")[0].split("/");
    
    const dateObj = new Date(year, month - 1, day);
    
    const monthName = dateObj.toLocaleString('default', { month: 'long' }).toLowerCase();
    const monthShort = dateObj.toLocaleString('default', { month: 'short' }).toLowerCase();
    
    const monthMatch =
      monthName.includes(text) ||
      monthShort.includes(text) ||
      month === text ||
      year.includes(text);
    
    // ✅ FIXED
    const monthYearMatch = `${month}/${year}`.includes(text);
    
    const fullDateMatch = `${day}/${month}/${year}`.includes(text);
    
    return noteMatch || monthMatch || monthYearMatch || fullDateMatch;
  });
  
  display(filtered);
}

async function deleteItem(id){
  if(!confirm("Are you sure you want to delete this entry?")) return;
  await db.collection("entries").doc(id).delete();
  loadData();
}

async function togglePin(id){ const item=data.find(d=>d.id===id); await db.collection("entries").doc(id).update({pinned:!item.pinned}); loadData(); }
function editItem(id) {
  let item = data.find(d => d.id === id);
  
  const [day, month, year, time] = item.date.split(/[/ ]/);
  
  document.getElementById("date").value = `${year}-${month}-${day}`;
  document.getElementById("time").value = time;
  document.getElementById("note").value = item.note;
  const noteBox = document.getElementById("note");

// ✅ Auto expand based on existing text
noteBox.style.height = "auto";
noteBox.style.height = noteBox.scrollHeight + "px";
  document.getElementById("amount").value = "";
  document.getElementById("liveAmount").value = parseAmount(item.note, null);
  
  // ✅ Show previous image if exists
  imageBase64 = item.image || null;
  document.getElementById("imageInput").value = ""; // clear file input so user can replace
  
  editId = id;
  document.getElementById("addBtn").innerText = "Update";
  
  // 🔥 AUTO SCROLL + FOCUS
  setTimeout(() => {
    const noteBox = document.getElementById("note");
    
    // Scroll to note box smoothly
    noteBox.scrollIntoView({
      behavior: "smooth",
      block: "center"
    });
    
    // Focus cursor inside note box
    noteBox.focus();

// ✅ Move cursor to END
const len = noteBox.value.length;
noteBox.setSelectionRange(len, len);
    
  }, 200);
}

// Monthly Chart
function renderChart(arr){
  const monthlyTotals={};
  arr.forEach(item=>{
    const [day,month,year] = item.date.split(" ")[0].split("/");
    const dt = new Date(Number(year), Number(month)-1, Number(day));
    const key = dt.getFullYear()+"-"+(dt.getMonth()+1);
    if(!monthlyTotals[key]) monthlyTotals[key]=0;
    monthlyTotals[key]+=item.amount;
  });

  const labels = Object.keys(monthlyTotals).sort((a,b)=>{
    const [ay,am] = a.split("-").map(Number);
    const [by,bm] = b.split("-").map(Number);
    return new Date(ay,am-1)-new Date(by,bm-1);
  });

  const dataVals = labels.map(l=>monthlyTotals[l]);
  const labelNames = labels.map(l=>{
    const [y,m] = l.split("-");
    return new Date(Number(y), Number(m)-1).toLocaleString('default',{month:'short',year:'numeric'});
  });

  const now = new Date();
  const bgColors = labels.map(l=>{
    const [y,m] = l.split("-");
    const d = new Date(Number(y), Number(m)-1);
    return (d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear()) ? 'rgba(255,99,132,0.7)' : 'rgba(75,192,192,0.6)';
  });

  if(monthlyChart) monthlyChart.destroy();
  const ctx = document.getElementById("monthlyChart").getContext("2d");
  monthlyChart = new Chart(ctx,{
    type:'bar',
    data:{ labels:labelNames, datasets:[{label:'Monthly Total ₹', data:dataVals, backgroundColor:bgColors}] },
    options:{ responsive:true, plugins:{ legend:{display:true} }, scales:{ y:{ beginAtZero:true } } }
  });
}

function logout(){
  firebase.auth().signOut()
    .then(()=>{
      alert("Logged out successfully!");
      document.getElementById("app").style.display = "none";
      document.getElementById("login").style.display = "block";
      clearAllFields(); // reset all inputs
    })
    .catch(err=>{
      alert("Logout error: " + err.message);
    });
}
function logout(){
  firebase.auth().signOut()
    .then(()=>{
      alert("Logged out successfully!");
      
      // Hide diary page, show login page
      document.getElementById("app").style.display = "none";
      document.getElementById("login").style.display = "block";
      
      // Clear all diary fields
      clearAllFields();
      
      // ✅ Clear login page inputs
      document.getElementById("email").value = "";
      document.getElementById("password").value = "";
      
    })
    .catch(err=>{
      alert("Logout error: " + err.message);
    });
}
function openImage(src) {
  const modal = document.getElementById("imageModal");
  const img = document.getElementById("modalImage");
  const downloadBtn = document.getElementById("downloadBtn");
  
  img.src = src;
  downloadBtn.href = src; // ✅ set download link
  
  modal.style.display = "flex";
}

function closeImage() {
  const modal = document.getElementById("imageModal");
  const img = document.getElementById("modalImage");
  
  modal.style.display = "none";
  img.src = "";
}

// Optional: click outside to close
document.getElementById("imageModal").addEventListener("click", function(e) {
  if (e.target.id === "imageModal") {
    closeImage();
  }
});
</script>
