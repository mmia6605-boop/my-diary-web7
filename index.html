function applyTheme(theme){
  if(theme === "light"){ document.body.classList.remove("dark"); } 
  else if(theme === "dark"){ document.body.classList.add("dark"); } 
  else if(theme === "auto"){
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    if(prefersDark) document.body.classList.add("dark");
    else document.body.classList.remove("dark");
  }

// Parse amount from note
function parseAmount(note, manualAmount) {
  if (manualAmount) return parseInt(manualAmount) || 0;
  
  if (!note) return 0;
  
  // ✅ Replace comma with +
  let expr = note.replace(/,/g, "+");
  
  // ✅ Add + between numbers if no operator (space case)
  expr = expr.replace(/(\d)\s+(\d)/g, "$1+$2");
  
  // ✅ Keep only valid characters (security)
  expr = expr.replace(/[^0-9+\-]/g, "");
  
  try {
    // ✅ Evaluate expression
    return eval(expr) || 0;
  } catch {
    return 0;
  }
}

  // ✅ Auto height

// Add/Update Entry
async function addEntry(){

  let date=document.getElementById("date").value || new Date().toISOString().split('T')[0];
  let time=document.getElementById("time").value || new Date().toTimeString().slice(0,5);
  let note=document.getElementById("note").value.trim();
  if(!note){ 
    document.getElementById("error").innerText="Note required"; 
    document.getElementById("error").style.display="block"; 
    return; 
  }
  let manualAmount=document.getElementById("amount").value.trim();
  let amount = parseAmount(note, manualAmount);

  const [year,month,day] = date.split("-");
  const formattedDate = day+"/"+month+"/"+year+" "+time;

  const entryData = { date: formattedDate, note, amount, pinned:false, created:Date.now(), image:imageBase64 };

  if(editId){
    await db.collection("entries").doc(editId).update(entryData);
    editId=null; 
    document.getElementById("addBtn").innerText="Add";
  } else {
    await db.collection("entries").add(entryData);
  }

  document.getElementById("error").style.display="none";
  clearAllFields(); 
  imageBase64 = null; // reset image
  document.getElementById("imageInput").value = ""; // clear file input
  loadData();
}
if (navigator.onLine) {

  document.getElementById("addBtn").innerText = "Add";  
  document.getElementById("search").value = "";
loadData(); // ✅ reload full data
}

// Load Data and sort
function loadData() {
  db.collection("entries")
    .onSnapshot(snapshot => {
      
      if (navigator.onLine) {
        showSyncStatus("✅ Synced");
      }
      
      data = snapshot.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
      }));
      
      // 🔽 Sort
      data.sort((a, b) => {
        const parseDate = str => {
          const [d, m, y, t] = str.split(/[/ ]/);
          const [h, min] = t.split(":").map(Number);
          return new Date(y, m - 1, d, h, min);
        };
        const dateA = parseDate(a.date);
        const dateB = parseDate(b.date);
        return sortType === "new" ? dateB - dateA : dateA - dateB;
      });
      
      display(data);
      renderChart(data);
      populateYearOptions(data);
    });
}

<button

// Pin/Unpin/Search/Edit/Delete/Clear
function togglePinned(){ const sec=document.getElementById("pinned"); sec.style.display=sec.style.display==="block"?"none":"block"; }
function searchData() {
  let text = document.getElementById("search").value.toLowerCase().trim();
  
  // ✅ If empty → show all data (current month total handled in display)
  if (!text) {
    display(data);
    return;
  }
  
  const filtered = data.filter(d => {
    const noteMatch = d.note.toLowerCase().includes(text);
    
    const [day, month, year] = d.date.split(" ")[0].split("/");
    
    const dateObj = new Date(year, month - 1, day);
    
    const monthName = dateObj.toLocaleString('default', { month: 'long' }).toLowerCase();
    const monthShort = dateObj.toLocaleString('default', { month: 'short' }).toLowerCase();
    
    const monthMatch =
      monthName.includes(text) ||
      monthShort.includes(text) ||
      month === text ||
      year.includes(text);
    
    // ✅ FIXED
    const monthYearMatch = `${month}/${year}`.includes(text);
    
    const fullDateMatch = `${day}/${month}/${year}`.includes(text);
    
    return noteMatch || monthMatch || monthYearMatch || fullDateMatch;
  });
  
  display(filtered);
}

// ✅ Move cursor to END
const len = noteBox.value.length;

function populateYearOptions(arr) {
  const yearSet = new Set();
  
  arr.forEach(item => {
    const [d, m, y] = item.date.split(" ")[0].split("/");
    yearSet.add(y);
  });
  
  const yearSelect = document.getElementById("yearSelect");
  
  const currentValue = yearSelect.value;
  
  yearSet.forEach(y => {
    if (!document.querySelector(`#yearSelect option[value="${y}"]`)) {
      const opt = document.createElement("option");
      opt.value = y;
      opt.textContent = y;
      yearSelect.appendChild(opt);
    }
  });
  
  // default = last3
  if (!currentValue) {
    yearSelect.value = "last3";
  }
}
// Monthly Chart
function renderChart(arr) {
  const mode = document.getElementById("yearSelect").value;
  
  let labels = [];
  let dataVals = [];
  let bgColors = [];
  
  const now = new Date();
  
  // ✅ LAST 3 MONTHS (default)
  if (mode === "last3") {
    const monthlyTotals = {};
    
    arr.forEach(item => {
      const [d, m, y] = item.date.split(" ")[0].split("/");
      const dt = new Date(y, m - 1, d);
      
      const key = dt.getFullYear() + "-" + (dt.getMonth() + 1);
      if (!monthlyTotals[key]) monthlyTotals[key] = 0;
      monthlyTotals[key] += item.amount;
    });
    
    const last3 = [];
    for (let i = 2; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i);
      const key = d.getFullYear() + "-" + (d.getMonth() + 1);
      last3.push(key);
    }
    
    labels = last3.map(k => {
      const [y, m] = k.split("-");
      return new Date(y, m - 1).toLocaleString('default', { month: 'short' });
    });
    
    dataVals = last3.map(k => monthlyTotals[k] || 0);
    
    bgColors = last3.map((_, i) =>
      i === 2 ? 'rgba(255,99,132,0.8)' : 'rgba(75,192,192,0.6)'
    );
  }
  
  // ✅ ALL YEARS
  else if (mode === "all") {
    const yearlyTotals = {};
    
    arr.forEach(item => {
      const [d, m, y] = item.date.split(" ")[0].split("/");
      if (!yearlyTotals[y]) yearlyTotals[y] = 0;
      yearlyTotals[y] += item.amount;
    });
    
    labels = Object.keys(yearlyTotals).sort();
    dataVals = labels.map(y => yearlyTotals[y]);
    
    bgColors = labels.map(y =>
      y == now.getFullYear() ?
      'rgba(255,99,132,0.8)' :
      'rgba(75,192,192,0.6)'
    );
  }
  
  // ✅ SPECIFIC YEAR
  else {
    const monthlyTotals = Array(12).fill(0);
    
    arr.forEach(item => {
      const [d, m, y] = item.date.split(" ")[0].split("/");
      if (y == mode) {
        monthlyTotals[m - 1] += item.amount;
      }
    });
    
    labels = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    dataVals = monthlyTotals;
    
    bgColors = labels.map((_, i) =>
      (i === now.getMonth() && mode == now.getFullYear()) ?
      'rgba(255,99,132,0.8)' :
      'rgba(75,192,192,0.6)'
    );
  }
  
  if (monthlyChart) monthlyChart.destroy();
  
  const ctx = document.getElementById("monthlyChart").getContext("2d");
  
  monthlyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Total ₹',
        data: dataVals,
        backgroundColor: bgColors
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: true } },
      scales: { y: { beginAtZero: true } }
    }
  });
}

// 👇 PASTE HERE
async function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  if (!confirm("⚠ This will DELETE all old data and replace with new. Continue?")) return;
  
  const reader = new FileReader();
  
  reader.onload = async function(e) {
    try {
      const importedData = JSON.parse(e.target.result);
      
      const snapshot = await db.collection("entries").get();
      const batch = db.batch();
      
      snapshot.docs.forEach(doc => {
        batch.delete(doc.ref);
      });
      
      await batch.commit();
      
      for (let item of importedData) {
        await db.collection("entries").add({
          date: item.date,
          note: item.note,
          amount: item.amount,
          pinned: item.pinned || false,
          created: item.created || Date.now(),
          image: item.image || null
        });
      }
      
      alert("✅ Import successful!");
      loadData();
      
    } catch (err) {
      alert("❌ Invalid JSON file!");
    }
  };
  
  reader.readAsText(file);
}

function exportTXT() {
  if (!confirm("Export all entries as TXT?")) return;
  
  let text = "";
  
  data.forEach(item => {
    text += `Date: ${item.date}\n`;
    text += `Note: ${item.note}\n`;
    text += `Amount: ₹${item.amount}\n`;
    text += `--------------------------\n`;
  });
  
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement("a");
  a.href = url;
  a.download = "diary.txt";
  a.click();
  
  URL.revokeObjectURL(url);
}
function exportJSON() {
  if (!confirm("Export all entries as JSON?")) return;
  
  const json = JSON.stringify(data, null, 2);
  
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement("a");
  a.href = url;
  a.download = "diary.json";
  a.click();
  
  URL.revokeObjectURL(url);
}

// Auto show + hide
let scrollTimeout;

function showScrollButtons() {
  const btns = document.getElementById("scrollBtns");
  if (!btns) return;
  
  btns.style.opacity = "1";
  btns.style.pointerEvents = "auto";
  
  clearTimeout(scrollTimeout);
  
  scrollTimeout = setTimeout(() => {
    btns.style.opacity = "0";
    btns.style.pointerEvents = "none";
  }, 3000);
}

// Detect scroll

  });
}
